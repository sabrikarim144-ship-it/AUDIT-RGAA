<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit RGAA Pro</title>
<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header { background:#0e0e0e; color:#fff; padding:1rem; display:flex; justify-content:space-between; }
.container { display:flex; }
.sidebar { width:250px; background:#111; color:#fff; padding:15px; height:100vh; overflow:auto; }
.sidebar h3 { font-size:14px; margin-bottom:10px; }
.sidebar button { width:100%; margin-bottom:5px; background:#222; color:#fff; border:none; padding:8px; cursor:pointer; }
.main { flex:1; padding:20px; overflow:auto; }
.card { background:#fff; padding:15px; border-radius:8px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05);} 
select, textarea, input { width:100%; padding:8px; margin-top:5px; margin-bottom:10px; }
button.primary { background:#0A66C2; color:#fff; border:none; padding:10px; border-radius:5px; cursor:pointer; }
.badge { padding:3px 8px; border-radius:4px; font-size:12px; margin-left:10px; }
.ok { background:#d4edda; }
.ko { background:#f8d7da; }
.na { background:#e2e3e5; }
.score { font-size:18px; }
</style>
</head>
<body>
<header>
<h2>Audit RGAA Pro</h2>
<div class="score">Score : <span id="score">0%</span></div>
</header>

<div class="container">

<div class="sidebar" id="themes"></div>

<div class="main">

<div class="card">
<label>URL auditée</label>
<input type="text" id="url" placeholder="https://...">
<button class="primary" onclick="initAudit()">Démarrer audit</button>
<button onclick="exportJSON()">Exporter JSON</button>
</div>

<div id="results"></div>

</div>
</div>

<script>
const data = [
 {id:"1.1",theme:"Images",wcag:"A",desc:"Alternative textuelle"},
 {id:"1.2",theme:"Images",wcag:"A",desc:"Images décoratives ignorées"},
 {id:"2.1",theme:"Navigation",wcag:"A",desc:"Navigation clavier"},
 {id:"2.2",theme:"Navigation",wcag:"AA",desc:"Temps suffisant"},
 {id:"3.3",theme:"Formulaire",wcag:"AA",desc:"Erreurs identifiées"}
];

let audit = {};

function initAudit(){
 document.getElementById('results').innerHTML='';
 audit = {};
 renderThemes();
 renderCriteria();
}

function renderThemes(){
 const sidebar = document.getElementById('themes');
 const themes = [...new Set(data.map(d=>d.theme))];
 sidebar.innerHTML = '<h3>Thématiques</h3>';
 themes.forEach(t=>{
   const btn = document.createElement('button');
   btn.innerText = t;
   btn.onclick = ()=>filterTheme(t);
   sidebar.appendChild(btn);
 });
}

function renderCriteria(filter=null){
 const container = document.getElementById('results');
 container.innerHTML='';
 data.filter(d=>!filter||d.theme===filter).forEach(c=>{
  const card = document.createElement('div');
  card.className='card';

  card.innerHTML=`
   <h3>${c.id} - ${c.theme} (${c.wcag})</h3>
   <p>${c.desc}</p>

   <label>Statut</label>
   <select onchange="update('${c.id}', this)">
     <option value="">--</option>
     <option value="ok">Conforme</option>
     <option value="ko">Non conforme</option>
     <option value="na">NA</option>
   </select>
   <span class="badge"></span>

   <label>Recommandation</label>
   <textarea onchange="save('${c.id}','rec',this.value)"></textarea>

   <label>Dérogation</label>
   <textarea onchange="save('${c.id}','der',this.value)"></textarea>

   <label>Correction</label>
   <textarea onchange="save('${c.id}','fix',this.value)"></textarea>

   <label>Méthodologie</label>
   <textarea onchange="save('${c.id}','meth',this.value)"></textarea>
  `;

  container.appendChild(card);
 });
}

function filterTheme(t){ renderCriteria(t); }

function update(id,select){
 const badge = select.parentElement.querySelector('.badge');
 badge.className='badge '+select.value;
 badge.innerText=select.value;
 audit[id] = audit[id]||{};
 audit[id].status = select.value;
 computeScore();
 saveLocal();
}

function save(id,key,value){
 audit[id]=audit[id]||{};
 audit[id][key]=value;
 saveLocal();
}

function computeScore(){
 const vals = Object.values(audit).map(a=>a.status);
 const ok = vals.filter(v=>v==='ok').length;
 const total = vals.length||1;
 document.getElementById('score').innerText = Math.round((ok/total)*100)+'%';
}

function exportJSON(){
 const blob = new Blob([JSON.stringify(audit,null,2)],{type:'application/json'});
 const a = document.createElement('a');
 a.href = URL.createObjectURL(blob);
 a.download = 'audit-rgaa.json';
 a.click();
}

function saveLocal(){
 localStorage.setItem('auditRGAA', JSON.stringify(audit));
}

function loadLocal(){
 const saved = localStorage.getItem('auditRGAA');
 if(saved) audit = JSON.parse(saved);
}

loadLocal();
</script>

</body>
</html>
